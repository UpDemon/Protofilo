<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon | Developer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d0d;
            color: #e8e0d8;
            font-family: 'Inter', sans-serif;
            cursor: none;
            overflow-x: hidden;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0d0d0d 100%);
            z-index: -2;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #e8e0d8;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: 0.1s;
            mix-blend-mode: difference;
        }

        .cursor-light {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(232, 224, 216, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* HEADER */
        .hero {
            text-align: center;
            padding: 60px 0 40px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .hero .name {
            font-size: 5em;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #e8e0d8 0%, #a89888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero .title {
            font-size: 1.2em;
            color: #888;
            font-weight: 300;
            letter-spacing: 3px;
            margin-top: 6px;
        }

        .hero .location {
            color: #666;
            font-size: 0.9em;
            margin-top: 4px;
        }

        /* STATUS */
        .status-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px 30px;
            margin: 30px auto;
            display: inline-flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            transition: 0.3s;
        }

        .status-online { background: #43b581; box-shadow: 0 0 20px rgba(67,181,129,0.3); }
        .status-idle { background: #faa61a; box-shadow: 0 0 20px rgba(250,166,26,0.3); }
        .status-dnd { background: #f04747; box-shadow: 0 0 20px rgba(240,71,71,0.3); }
        .status-offline { background: #747f8d; }

        .status-label {
            font-size: 0.95em;
            color: #aaa;
        }
        .status-label strong { color: #e8e0d8; font-weight: 400; }

        .badge-work {
            background: rgba(67,181,129,0.08);
            border: 1px solid rgba(67,181,129,0.15);
            padding: 4px 18px;
            border-radius: 30px;
            font-size: 0.8em;
            color: #43b581;
        }

        .badge-work.idle {
            background: rgba(250,166,26,0.08);
            border-color: rgba(250,166,26,0.15);
            color: #faa61a;
        }

        /* SKILLS */
        .section-title {
            font-size: 1.8em;
            font-weight: 700;
            margin: 50px 0 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title span {
            font-size: 0.5em;
            font-weight: 300;
            color: #555;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .skill-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .skill-card:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.08);
        }
        .skill-card .left { display: flex; align-items: center; gap: 10px; }
        .skill-card .left .icon { font-size: 1.4em; }
        .skill-card .left .name { font-weight: 400; }
        .skill-card .right { display: flex; align-items: center; gap: 12px; }
        .skill-card .bar {
            width: 80px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
        }
        .skill-card .bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #a89888, #e8e0d8);
            border-radius: 4px;
            transition: 1s;
            width: 0%;
        }
        .skill-card .percent { font-size: 0.8em; color: #666; min-width: 35px; text-align: right; }

        /* PROJECTS */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .project-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 24px 16px;
            text-align: center;
            transition: 0.2s;
        }
        .project-card:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.08);
            transform: translateY(-3px);
        }
        .project-card .icon { font-size: 2.6em; margin-bottom: 8px; }
        .project-card .title { font-weight: 600; font-size: 1em; }
        .project-card .desc { font-size: 0.8em; color: #666; margin-top: 4px; }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #444;
            font-size: 0.8em;
            border-top: 1px solid rgba(255,255,255,0.03);
            margin-top: 50px;
        }

        @media (max-width: 700px) {
            .hero .name { font-size: 3.2em; }
            .status-box { flex-direction: column; padding: 18px 20px; }
            .skills-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="bg-grid"></div>
<div class="cursor-light" id="cursorLight"></div>
<div class="cursor" id="cursor"></div>

<div class="container">

    <!-- HERO -->
    <div class="hero">
        <div class="name">Demon</div>
        <div class="title">Full Stack · Minecraft Expert</div>
        <div class="location">🇩🇿 Algeria · 15 Nov 2011</div>

        <!-- STATUS -->
        <div class="status-box" id="statusBox">
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="status-dot status-offline" id="statusDot"></span>
                <span class="status-label" id="statusText">⏳ جاري التحقق...</span>
            </div>
            <span class="badge-work" id="workBadge">⚡ Working on Projects</span>
        </div>
    </div>

    <!-- SKILLS -->
    <div class="section-title">🛠️ Skills <span>قابلة للتعديل من الكود</span></div>
    <div class="skills-grid" id="skillsGrid"></div>

    <!-- PROJECTS -->
    <div class="section-title">🚀 Projects</div>
    <div class="projects-grid" id="projectsGrid"></div>

    <footer>© 2026 Demon · Built with ❤️</footer>
</div>

<script>
    // ============================================================
    // 🔧 ====== إعدادات البوت والتوكن هنا ======
    // ============================================================

    // ⚡ ضع توكن البوت هنا (Bot Token)
    const BOT_TOKEN = 'MTUxMzE1NDc1NTkwNjc2NDgxMA.GJeYbU.iQPRnJpZdFoeSUI10vKDOK6RkSesr_Q1WfUPNM';

    // 🆔 ضع اليوزر آيدي حق حسابك الشخصي هنا
    const USER_ID = '1374386425746952265';

    // ============================================================
    // المهارات (عدّل أو أضف من هنا)
    // ============================================================
    const skillsData = [
        { name: 'Node.js & Discord.js', percent: 95, icon: '🟢' },
        { name: 'Minecraft Config', percent: 100, icon: '⛏️' },
        { name: 'Full Stack Web', percent: 90, icon: '🌐' },
        { name: 'Python', percent: 85, icon: '🐍' },
        { name: 'JavaScript/TS', percent: 92, icon: '📜' },
        { name: 'React & Vue', percent: 80, icon: '⚛️' },
        { name: 'PHP & MySQL', percent: 75, icon: '🐘' },
        { name: 'C# / .NET', percent: 70, icon: '🔷' },
        { name: 'Java (Spigot/Paper)', percent: 88, icon: '☕' },
        { name: 'Lua (FiveM)', percent: 65, icon: '🌙' }
    ];

    // ============================================================
    // المشاريع (عدّل من هنا)
    // ============================================================
    const projectsData = [
        { icon: '⚙️', title: 'Minecraft Servers', desc: 'High-performance setups' },
        { icon: '🤖', title: 'Discord Bots', desc: 'Advanced Discord.js bots' },
        { icon: '🌐', title: 'Full Stack Web', desc: 'Apps & APIs' },
        { icon: '🎮', title: 'Game Dev', desc: 'Interactive experiences' },
        { icon: '🔧', title: 'Plugins', desc: 'Custom Spigot plugins' },
        { icon: '📊', title: 'Economy Systems', desc: 'Vault & CoinsEngine' }
    ];

    // ============================================================
    // كود العرض (ما تحتاج تلمسه)
    // ============================================================

    // cursor
    const cursor = document.getElementById('cursor');
    const light = document.getElementById('cursorLight');
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        light.style.left = e.clientX + 'px';
        light.style.top = e.clientY + 'px';
    });

    // skills
    const grid = document.getElementById('skillsGrid');
    skillsData.forEach(s => {
        const card = document.createElement('div');
        card.className = 'skill-card';
        card.innerHTML = `
            <div class="left">
                <span class="icon">${s.icon}</span>
                <span class="name">${s.name}</span>
            </div>
            <div class="right">
                <div class="bar"><div class="fill" style="width:0%"></div></div>
                <span class="percent">${s.percent}%</span>
            </div>
        `;
        grid.appendChild(card);
        setTimeout(() => {
            card.querySelector('.fill').style.width = s.percent + '%';
        }, 200);
    });

    // projects
    const pGrid = document.getElementById('projectsGrid');
    projectsData.forEach(p => {
        const card = document.createElement('div');
        card.className = 'project-card';
        card.innerHTML = `
            <div class="icon">${p.icon}</div>
            <div class="title">${p.title}</div>
            <div class="desc">${p.desc}</div>
        `;
        pGrid.appendChild(card);
    });

    // ============================================================
    // نظام فحص الحالة عبر البوت
    // ============================================================
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const workBadge = document.getElementById('workBadge');

    async function fetchStatus() {
        if (!BOT_TOKEN || BOT_TOKEN === 'ضع_توكن_البوت_هنا') {
            statusText.innerHTML = '⚠️ <strong>يرجى ضبط توكن البوت</strong>';
            return;
        }
        if (!USER_ID || USER_ID === 'ضع_اليوزر_آيدي_هنا') {
            statusText.innerHTML = '⚠️ <strong>يرجى ضبط اليوزر آيدي</strong>';
            return;
        }

        try {
            const res = await fetch(`https://discord.com/api/v9/users/${USER_ID}`, {
                headers: { 'Authorization': `Bot ${BOT_TOKEN}` }
            });
            if (!res.ok) throw new Error('فشل');

            const data = await res.json();
            const status = data.presence?.status || 'offline';

            // تحديث النقطة
            dot.className = 'status-dot';
            let label = '';
            switch (status) {
                case 'online': dot.classList.add('status-online'); label = '🟢 أونلاين'; break;
                case 'idle': dot.classList.add('status-idle'); label = '🟡 Busy Now (مشغول)'; break;
                case 'dnd': dot.classList.add('status-dnd'); label = '🔴 لا تزعج'; break;
                default: dot.classList.add('status-offline'); label = '⚫ أوفلاين';
            }
            statusText.innerHTML = `<strong>${data.username}</strong> · ${label}`;

            // تحديث شارة العمل
            if (status === 'idle') {
                workBadge.textContent = '🟡 Busy Now';
                workBadge.className = 'badge-work idle';
            } else {
                workBadge.textContent = '⚡ Working on Projects';
                workBadge.className = 'badge-work';
            }

        } catch (e) {
            dot.className = 'status-dot status-offline';
            statusText.innerHTML = '⚠️ <strong>خطأ</strong> · تأكد من التوكن والآيدي';
        }
    }

    // فحص أولي ثم كل 5 ثواني
    fetchStatus();
    setInterval(fetchStatus, 5000);
</script>

</body>
</html>
